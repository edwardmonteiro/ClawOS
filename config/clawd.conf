# ClawOS Kernel Daemon Configuration
# /etc/claw/clawd.conf

# Logging
log_level = info        # error, warn, info, debug
log_file = /var/log/claw/clawd.log

# Socket
socket = /run/claw/clawd.sock

# Agent limits
max_agents = 4096

# Extension directory
ext_dir = /usr/lib/claw/extensions

# Cgroup root
cgroup_root = /sys/fs/cgroup/claw

# Default agent resource limits (0 = unlimited)
default_memory_limit = 0
default_cpu_shares = 100
