# OpenClaw Runtime Configuration
# /etc/claw/openclaw.conf

# API socket
socket = /run/claw/openclaw.sock

# Manifest directory
manifests_dir = /etc/claw/manifests

# Registry (installed agents)
registry_dir = /var/lib/claw/registry

# Log level
log_level = info

# Auto-deploy manifests on startup
auto_deploy = true
